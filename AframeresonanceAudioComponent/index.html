<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Room</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- Teleport -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-blink-controls/dist/aframe-blink-controls.min.js"></script>
    <!-- Click and hands -->
    <script src="https://unpkg.com/super-hands@^3.0.3/dist/super-hands.min.js"></script>
    <!-- Resonance component -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-resonance-audio-component@latest/dist/aframe-resonance-audio-component.min.js"></script>
    <script src="rooms.js"></script>
  </head>

  <body>
    <a-scene background="color: #FAFAFA">
      <!-- assets -->
      <a-assets>
        <!-- sound effect -->
        <audio id="music" src="../audio/music.mp3" preload></audio>
      </a-assets>

      <a-resonance-audio-room
        position="0 0 -5"
        width="40"
        height="4"
        depth="4"
        ambisonic-order="3"
        speed-of-sound="343"
        left="brick-bare"
        right="curtain-heavy"
        front="plywood-panel"
        back="glass-thin"
        down="parquet-on-concrete"
        up="acoustic-ceiling-tiles"
        visualize="true"
      >
        <a-resonance-audio-src
          position="-10 0 0"
          src="#music"
          loop="true"
          autoplay="true"
          visualize="true"
        ></a-resonance-audio-src>
        <a-resonance-audio-src
          position="10 0 0"
          src="#music"
          loop="true"
          autoplay="true"
          visualize="true"
        ></a-resonance-audio-src>
      </a-resonance-audio-room>

      <!-- user -->
      <a-entity id="player">
        <!-- camera -->
        <a-entity
          id="camera"
          camera
          position="0 1.6 0"
          wasd-controls
          look-controls
        >
          <!-- TODO remove with svelte -->
          <a-cursor
            geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
            material="color: red"
          ></a-cursor>
        </a-entity>

        <!-- hand controls -->
        <a-entity
          id="left-hand"
          super-hands
          oculus-touch-controls="hand: left"
          blink-controls="button: trigger; rotateOnTeleport: false; collisionEntities: #floor, #wall;"
        ></a-entity>
        <a-entity
          id="right-hand"
          super-hands="colliderEvent: raycaster-intersection;
             colliderEventProperty: els;
             colliderEndEvent: raycaster-intersection-cleared;
             colliderEndEventProperty: clearedEls"
          oculus-touch-controls="hand: right"
          laser-controls="hand: right; model: false"
        ></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
