<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/aframe-logo-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A-Frame + Vite App</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    <script src="https://unpkg.com/aframe-layout-component@5.3.0/dist/aframe-layout-component.min.js"></script>
  </head>
  <body>
    <a-scene environment="preset: forest">
      <a-assets>
        <img id="portalPicture" src="/download.png" />
      </a-assets>
      <a-entity
        position="0 2.5 -7"
        layout="type: line; plane: yz; margin: 3; align: center;"
      >
        <a-entity layout="type: line; align: center; margin: 3;">
          <a-entity
            link="href: /; title: ND; image: #portalPicture; titleColor: #000000; borderColor: green; visualAspectEnabled: true;"
          ></a-entity>
          <a-entity
            link="href: /; title: ND; image: #portalPicture; titleColor: #000000; borderColor: green; visualAspectEnabled: true;"
          ></a-entity>
          <a-entity
            link="href: /; title: ND; image: #portalPicture; titleColor: #000000; borderColor: green; visualAspectEnabled: true;"
          ></a-entity>
          <a-entity
            link="href: /; title: ND; image: #portalPicture; titleColor: #000000; borderColor: green; visualAspectEnabled: true;"
          ></a-entity>
        </a-entity>
        <a-entity layout="type: line; align: center; margin: 3;">
          <a-entity
            link="href: /A1.html; title: A1; image: #portalPicture; titleColor: #000000; borderColor: yellow; visualAspectEnabled: true;"
          ></a-entity>
          <a-entity
            link="href: /; title: ND; image: #portalPicture; titleColor: #000000; borderColor: green; visualAspectEnabled: true;"
          ></a-entity>
          <a-entity
            link="href: /; title: ND; image: #portalPicture; titleColor: #000000; borderColor: green; visualAspectEnabled: true;"
          ></a-entity>
          <a-entity
            link="href: /; title: ND; image: #portalPicture; titleColor: #000000; borderColor: green; visualAspectEnabled: true;"
          ></a-entity>
        </a-entity>
      </a-entity>

      <a-camera>
        <a-cursor></a-cursor>
      </a-camera>
       <!-- hand controls -->
        <a-entity id="left-hand" super-hands oculus-touch-controls="hand: left">
          <!-- show a plane oriented as the controller -->
          <a-plane
            position="0 0.04 -0.15"
            rotation="-45 0 0"
            color="red"
            width="0.1"
            height="0.1"
          >
            <!-- box with text back -->
            <a-box
              position="0 0 0.01"
              color="black"
              width="0.1"
              height="0.1"
              depth="0.01"
              back-button
              data-raycastable
              >
              <a-text
              value="Back"
              align="center"
              position="0 0 0.01"
              scale="0.1 0.1 0.1"
              color="white"
              ></a-text>
            </a-box>
          </a-plane>
        </a-entity>
        <a-entity
          id="right-hand"
          super-hands="colliderEvent: raycaster-intersection;
             colliderEventProperty: els;
             colliderEndEvent: raycaster-intersection-cleared;
             colliderEndEventProperty: clearedEls"
          oculus-touch-controls="hand: right"
          laser-controls="hand: right; model: true"
          raycaster="objects: [data-raycastable]"
        ></a-entity>
      </a-entity>
    </a-scene>
    <script type="module" src="/main.js"></script>
  </body>
</html>
