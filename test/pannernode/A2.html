<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/aframe-logo-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resonance Audio Component</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- Click and hands -->
    <script src="https://unpkg.com/super-hands@^3.0.3/dist/super-hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-resonance-audio-component@1.1.0/dist/aframe-resonance-audio-component.min.js"></script>

    <script src="https://unpkg.com/aframe-state-component@7.1.0/dist/aframe-state-component.min.js"></script>
    <script type="module" src="utils/look-at.js"></script>
    <script src="utils/back-button.js" type="module"></script>
    <script>
      const TIME_BETWEEN_LEVELS = 3000;
      const PLAY_INTERVAL = 5000;
      const LEVELS = 1;

      const speakerPositions = distributeSpeakers(10);
      function distributeSpeakers(radius) {
        const positions = [];
        const numberOfLayers = 8;
        let numberOfBoxesForLine = 0;

        for (let layer = 0; layer < numberOfLayers; layer++) {
          switch (layer) {
            case 0:
              numberOfBoxesForLine = 1;
              break;
            case 1:
              numberOfBoxesForLine = 7;
              break;
            case 2:
              numberOfBoxesForLine = 11;
              break;
            case 3:
              numberOfBoxesForLine = 13;
              break;
            case 4:
              numberOfBoxesForLine = 13;
              break;
            case 5:
              numberOfBoxesForLine = 11;
              break;
            case 6:
              numberOfBoxesForLine = 7;
              break;
            case 7:
              numberOfBoxesForLine = 1;
              break;
          }

          for (let j = 0; j < numberOfBoxesForLine; j++) {
            const position = {
              x:
                radius *
                Math.sin((2 * Math.PI * j) / numberOfBoxesForLine) *
                Math.sin((Math.PI * layer) / numberOfLayers),
              y: radius * Math.cos((Math.PI * layer) / numberOfLayers),
              z:
                radius *
                Math.cos((2 * Math.PI * j) / numberOfBoxesForLine) *
                Math.sin((Math.PI * layer) / numberOfLayers),
            };

            if (layer === 7) {
              position.z = 0;
            }

            positions.push(position);
          }
        }
        return positions;
      }

      AFRAME.registerState({
        initialState: {
          audioSources: Array.from({ length: 64 }, (_, i) => ({
            id: `src-${i}`,
          })),
          speakers: Array.from({ length: 64 }, (_, i) => ({
            id: `speaker-${i}`,
            audioSrc: `#src-${i}`,
            position: `${speakerPositions[i].x} ${speakerPositions[i].y} ${speakerPositions[i].z}`,
          })),
          currentPlayingSpeaker: "",
          score: 0,
          messageBox: "What speaker is playing?",
          currentLevel: 0,
          isPLaying: false,
        },

        handlers: {
          playLoop: function (state, action) {
            if (state.isPLaying === false) {
              playingSpeaker.pause();
            }
            const playingSpeaker = document.querySelector(
              `#src-${action.speaker}`
            );
            playingSpeaker.play();
            setInterval(() => {
              if (playingSpeaker.ended) {
                AFRAME.scenes[0].emit("playLoop", { speaker: action.speaker });
              }
            }, PLAY_INTERVAL);
          },
          playFromRandomSpeaker: function (state, action) {
            // random number from 0 to 63
            const rand = Math.floor(Math.random() * (63 + 1));
            console.log("Speaker playing =", rand);
            // play audio from random speaker
            state.isPLaying = true;
            AFRAME.scenes[0].emit("playLoop", { speaker: rand });

            // update currentPlayingSpeaker
            state.currentPlayingSpeaker = `${rand}`;
            console.log("State:", state);
          },

          updateScore: function (state, action) {
            state.score += 1;
          },

          updateMessageBox: function (state, action) {
            state.messageBox = action.message;
          },

          speakerClicked: function (state, action) {
            console.log("clicked");
            // stop sound from current speaker
            var playingSpeaker = document.querySelector(
              `#src-${state.currentPlayingSpeaker}`
            );
            state.isPLaying = false;
            playingSpeaker.pause();
            console.log("stop");
            // check if clicked speaker is equal to current playing speaker
            console.log(`speaker-${action.speakerClicked}`);
            console.log(`speaker-${state.currentPlayingSpeaker}`);
            if (
              `speaker-${action.speakerClicked}` ===
              `speaker-${state.currentPlayingSpeaker}`
            ) {
              // id yes increment score and write Correct in message box
              AFRAME.scenes[0].emit("updateScore");
              console.log("score++");
              console.log("correct");

              AFRAME.scenes[0].emit("updateMessageBox", {
                message: "Correct!",
              });
            } else {
              // if not write Wrong in message box
              console.log("wrong");
              AFRAME.scenes[0].emit("updateMessageBox", {
                message: "Wrong",
              });
            }

            console.log("State:", state);
            // increment level
            state.currentLevel += 1;
            //  wait for n seconds
            setTimeout(() => {
              // check if levels < 10
              if (state.currentLevel < LEVELS) {
                // if yes, emit new playFromRandomSpeaker
                AFRAME.scenes[0].emit("updateMessageBox", {
                  message: "What Speaker is playing?",
                });
                AFRAME.scenes[0].emit("playFromRandomSpeaker");
              } else {
                // else set messagebox to "Game Over"
                console.log("Game Over");
                AFRAME.scenes[0].emit("updateMessageBox", {
                  message: "Game Over. Return to menu",
                });
              }
            }, TIME_BETWEEN_LEVELS);
          },
        },
      });

      AFRAME.registerComponent("wait-for-room", {
        dependencies: ["resonance-audio-room"],
        init: function () {
          AFRAME.scenes[0].emit("playFromRandomSpeaker");
        },
      });

      AFRAME.registerComponent("player", {
        dependencies: ["resonance-audio-src"],
        init: function () {
          this.el.addEventListener("audioroom-entered", () => {
            this.el.addEventListener("click", () => {
              console.log(this.el.id);
              AFRAME.scenes[0].emit("speakerClicked", {
                speakerClicked: this.el.id.split("-")[1],
              });
            });
          });
        },
      });
    </script>
  </head>
  <body>
    <a-scene background="color: #242424">
      <a-assets>
        <a-entity bind-for="for: item; in: audioSources; key: id">
          <template>
            <audio
              id="{{id}}"
              crossorigin="anonymous"
              preload="auto"
              src="/cow.mp3"
              loop="false"
            ></audio>
          </template>
        </a-entity>
      </a-assets>
      <a-sphere
        radius="10"
        segments-width="36"
        segments-height="18"
        wireframe="true"
      >
        <a-resonance-audio-room
          width="20"
          height="20"
          depth="20"
          ambisonic-order="3"
          speed-of-sound="343"
          left="acoustic-ceiling-tiles"
          right="acoustic-ceiling-tiles"
          front="acoustic-ceiling-tiles"
          back="acoustic-ceiling-tiles"
          down="acoustic-ceiling-tiles"
          up="acoustic-ceiling-tiles"
        >
          <a-entity wait-for-room bind-for="for: item; in: speakers; key: id">
            <template>
              <a-resonance-audio-src
                player
                id="{{id}}"
                position="{{position}}"
                resonance-audio-src="src: {{audioSrc}}; autoplay: false; loop: false;"
              >
                <a-box look-at="#player" data-clickable></a-box>
              </a-resonance-audio-src>
            </template>
          </a-entity>
        </a-resonance-audio-room>
      </a-sphere>

      <a-entity id="player">
        <!-- camera -->
        <a-entity
          id="camera"
          position="0 1.6 0"
          wasd-controls
          look-controls
          cursor="rayOrigin: mouse"
          raycaster="objects: [data-clickable]"
        >
          <a-text
            id="messageBox"
            bind="value: messageBox"
            color="white"
            position="-0.7 -0.7 -2"
            scale="0.3 0.3 0.3 "
            align="center"
          ></a-text>
          <a-text
            id="scoreBox"
            value="Score"
            color="white"
            position="0.7 -0.6 -2"
            scale="0.3 0.3 0.3 "
            align="center"
          ></a-text>
          <a-text
            id="scoreBox"
            bind="value: score"
            color="white"
            position="0.7 -0.7 -2"
            scale="0.3 0.3 0.3 "
            align="center"
          ></a-text>
        </a-entity>

        <!-- hand controls -->
        <a-entity id="left-hand" super-hands oculus-touch-controls="hand: left">
          <!-- show a plane oriented as the controller -->
          <a-plane
            position="0 0.04 -0.15"
            rotation="-45 0 0"
            color="red"
            width="0.1"
            height="0.1"
          >
            <!-- box with text back -->
            <a-box
              position="0 0 0.01"
              color="black"
              width="0.1"
              height="0.1"
              depth="0.01"
              back-button
              data-clickable
            >
              <a-text
                value="Back"
                align="center"
                position="0 0 0.01"
                scale="0.1 0.1 0.1"
                color="white"
              ></a-text>
            </a-box>
          </a-plane>
        </a-entity>
        <a-entity
          id="right-hand"
          super-hands="colliderEvent: raycaster-intersection;
             colliderEventProperty: els;
             colliderEndEvent: raycaster-intersection-cleared;
             colliderEndEventProperty: clearedEls"
          oculus-touch-controls="hand: right"
          laser-controls="hand: right; model: true"
          raycaster="objects: [data-clickable]"
        ></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
