<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- Click and hands -->
    <script src="https://unpkg.com/super-hands@^3.0.3/dist/super-hands.min.js"></script>
    <!-- State -->
    <script src="https://unpkg.com/aframe-state-component@7.1.0/dist/aframe-state-component.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="main.js" type="module"></script>
  </head>
  <body>
    <a-scene
      loading-screen="dotsColor: green; backgroundColor: black"
      background="color: #242424"
    >
      <a-assets>
        <a-entity bind-for="for: item; in: audioSources; key: id">
          <template>
            <audio
              id="{{id}}"
              crossorigin="anonymous"
              preload="auto"
              src="/cow.mp3"
            ></audio>
          </template>
        </a-entity>
      </a-assets>

      <a-sphere
        bind="radius: sphereRadius"
        segments-width="36"
        segments-height="18"
        wireframe="true"
      >
        <a-entity id="bro">
          <a-entity
            play-random-sound
            bind-for="for: item; in: speakers; key: id"
          >
            <template>
              <a-entity
                playerb
                id="{{id}}"
                position="{{position}}"
                sound="src: {{audioSrc}}; autoplay: false; loop: false;"
              >
                <a-box look-at="#player" data-clickable></a-box>
              </a-entity>
            </template>
          </a-entity>
        </a-entity>
      </a-sphere>

      <a-entity id="player">
        <!-- camera -->
        <a-entity
          id="camera"
          camera
          position="0 1.6 0"
          wasd-controls
          look-controls
          cursor="rayOrigin: mouse"
          raycaster="objects: [data-clickable]"
        >
          <a-text
            id="messageBox"
            bind="value: messageBox"
            color="white"
            position="-0.7 -0.7 -2"
            scale="0.3 0.3 0.3 "
            align="center"
          ></a-text>
          <a-text
            id="scoreBox"
            value="Score"
            color="white"
            position="0.7 -0.6 -2"
            scale="0.3 0.3 0.3 "
            align="center"
          ></a-text>
          <a-text
            id="scoreBox"
            bind="value: score"
            color="white"
            position="0.7 -0.7 -2"
            scale="0.3 0.3 0.3 "
            align="center"
          ></a-text>
        </a-entity>

        <!-- hand controls -->
        <a-entity id="left-hand" super-hands oculus-touch-controls="hand: left">
          <!-- show a plane oriented as the controller -->
          <a-plane
            position="0 0.04 -0.15"
            rotation="-45 0 0"
            color="red"
            width="0.1"
            height="0.1"
          >
            <!-- box with text back -->
            <a-box
              position="0 0 0.01"
              color="black"
              width="0.1"
              height="0.1"
              depth="0.01"
              back-button
              data-clickable
            >
              <a-text
                value="Back"
                align="center"
                position="0 0 0.01"
                scale="0.1 0.1 0.1"
                color="white"
              ></a-text>
            </a-box>
          </a-plane>
        </a-entity>
        <a-entity
          id="right-hand"
          super-hands="colliderEvent: raycaster-intersection;
             colliderEventProperty: els;
             colliderEndEvent: raycaster-intersection-cleared;
             colliderEndEventProperty: clearedEls"
          oculus-touch-controls="hand: right"
          laser-controls="hand: right; model: true"
          raycaster="objects: [data-clickable]"
        ></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
