<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Room</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-template-component@3.x.x/dist/aframe-template-component.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  <script src="rooms.js"></script>
</head>

<body>
  <a-scene background="color: #FAFAFA">
    <!-- assets -->
    <a-assets>
      <!-- sound effect -->
      <audio id="waterfall" src="../audio/waterfall.mp3" preload></audio>
      <audio id="crowd" src="../audio/crowd.mp3" preload></audio>
      <audio id="music" src="../audio/music.mp3" preload></audio>
    </a-assets>

    <!-- room -->
    <rw-room position="-5 0 -5" material="color: #444;" height="3">
      <rw-wall position="10 0 10"></rw-wall>
      <rw-wall position="10 0 0"></rw-wall>
      <rw-wall position="0 0 0"></rw-wall>
      <rw-wall position="0 0 10"></rw-wall>
      <rw-floor material="color: #333"></rw-floor>
      <rw-ceiling material="color: #333"></rw-ceiling>
    </rw-room>

    <!-- front speaker -->
    <a-box width="0.5" height="0.5" depth="0.5" material="color: lightblue" position="0 1.8 -4.5" data-raycastable
      sound="on: click; src: #waterfall">
    </a-box>

    <!-- left speaker -->
    <a-box width="0.5" height="0.5" depth="0.5" material="color: lightpink;" position="-4.5 1.8 0" data-raycastable
      sound="on: click; src: #music">
    </a-box>

    <!-- right speaker -->
    <a-box width="0.5" height="0.5" depth="0.5" material="color: acqua;" position="4.5 1.8 0" data-raycastable
      sound="on: click; src: #crowd">
    </a-box>

    <!-- back speaker -->
    <a-box width="0.5" height="0.5" depth="0.5" material="color: lightgreen;" position="0 1.8 4.5" data-raycastable
      sound="on: click; src: #music">
    </a-box>

    <!-- top speaker -->
    <a-box width="0.5" height="0.5" depth="0.5" material="color: lightyellow;" position="0 2.8 0" data-raycastable
      sound="on: click; src: #crowd">
    </a-box>

    <!-- bottom speaker -->
    <a-box width="0.5" height="0.5" depth="0.5" material="color: lightyellow;" position="0 0.2 0" data-raycastable
      sound="on: click; src: #waterfall">
    </a-box>

    <!-- user -->
    <a-entity id="camera" camera look-controls wasd-controls="fly: true;" oculus-touch-controls="hand: right"
      position="0 1.8 0">
      <a-cursor raycaster="objects: [data-raycastable]"></a-cursor>
    </a-entity>
  </a-scene>
</body>

</html>
